<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="50%" stop-color="#c0c0c0"/>
      <stop offset="100%" stop-color="#909090"/>
    </linearGradient>
    <linearGradient id="togaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f0e6"/>
      <stop offset="100%" stop-color="#d4c5a9"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="250" r="180" fill="#1a1a2e"/>
  <circle cx="200" cy="250" r="170" fill="#16213e"/>

  <!-- Toga body -->
  <path d="M120 200 Q100 280 110 380 Q200 420 290 380 Q300 280 280 200 Q200 220 120 200" fill="url(#togaGrad)"/>
  <path d="M120 200 Q140 260 130 380" fill="none" stroke="#b8a88a" stroke-width="3"/>
  <path d="M280 200 Q260 260 270 380" fill="none" stroke="#b8a88a" stroke-width="3"/>
  <!-- Toga sash over shoulder -->
  <path d="M160 180 Q140 240 125 320" fill="none" stroke="#e8ddd0" stroke-width="18" stroke-linecap="round"/>

  <!-- Robot neck -->
  <rect x="175" y="160" width="50" height="30" rx="8" fill="url(#metal)"/>

  <!-- Robot head -->
  <rect x="140" y="80" width="120" height="100" rx="25" fill="url(#metal)"/>
  <rect x="140" y="80" width="120" height="20" rx="10" fill="#a0a0a0"/>

  <!-- Eyes -->
  <circle cx="175" cy="125" r="14" fill="#00d4aa"/>
  <circle cx="175" cy="125" r="6" fill="#0a2f23"/>
  <circle cx="225" cy="125" r="14" fill="#00d4aa"/>
  <circle cx="225" cy="125" r="6" fill="#0a2f23"/>

  <!-- Mouth / grill -->
  <rect x="170" y="155" width="60" height="8" rx="4" fill="#666"/>
  <line x1="185" y1="155" x2="185" y2="163" stroke="#444" stroke-width="2"/>
  <line x1="200" y1="155" x2="200" y2="163" stroke="#444" stroke-width="2"/>
  <line x1="215" y1="155" x2="215" y2="163" stroke="#444" stroke-width="2"/>

  <!-- Antenna -->
  <line x1="200" y1="80" x2="200" y2="50" stroke="#888" stroke-width="4"/>
  <circle cx="200" cy="45" r="8" fill="url(#gold)"/>

  <!-- Laurel wreath -->
  <ellipse cx="200" cy="75" rx="70" ry="20" fill="none" stroke="#228b22" stroke-width="4"/>
  <!-- Leaves left -->
  <ellipse cx="155" cy="72" rx="10" ry="5" fill="#32cd32" transform="rotate(-30 155 72)"/>
  <ellipse cx="140" cy="78" rx="10" ry="5" fill="#32cd32" transform="rotate(-50 140 78)"/>
  <ellipse cx="130" cy="88" rx="10" ry="5" fill="#32cd32" transform="rotate(-70 130 88)"/>
  <!-- Leaves right -->
  <ellipse cx="245" cy="72" rx="10" ry="5" fill="#32cd32" transform="rotate(30 245 72)"/>
  <ellipse cx="260" cy="78" rx="10" ry="5" fill="#32cd32" transform="rotate(50 260 78)"/>
  <ellipse cx="270" cy="88" rx="10" ry="5" fill="#32cd32" transform="rotate(70 270 88)"/>
  <!-- Center leaves -->
  <ellipse cx="170" cy="65" rx="10" ry="5" fill="#32cd32" transform="rotate(-15 170 65)"/>
  <ellipse cx="200" cy="62" rx="10" ry="5" fill="#32cd32"/>
  <ellipse cx="230" cy="65" rx="10" ry="5" fill="#32cd32" transform="rotate(15 230 65)"/>

  <!-- Staff / scroll in hand -->
  <rect x="290" y="240" width="12" height="140" rx="6" fill="#8b6914"/>
  <circle cx="296" cy="235" r="14" fill="url(#gold)"/>
  <!-- Scroll -->
  <rect x="310" y="260" width="50" height="70" rx="5" fill="#f5f0e6"/>
  <path d="M310 260 Q335 255 360 260" fill="none" stroke="#d4c5a9" stroke-width="3"/>
  <path d="M310 330 Q335 335 360 330" fill="none" stroke="#d4c5a9" stroke-width="3"/>
  <!-- Scroll lines -->
  <line x1="320" y1="280" x2="350" y2="280" stroke="#b8a88a" stroke-width="2"/>
  <line x1="320" y1="295" x2="350" y2="295" stroke="#b8a88a" stroke-width="2"/>
  <line x1="320" y1="310" x2="340" y2="310" stroke="#b8a88a" stroke-width="2"/>

  <!-- Circuit pattern on toga -->
  <circle cx="200" cy="280" r="4" fill="#00d4aa" opacity="0.6"/>
  <line x1="200" y1="280" x2="170" y2="300" stroke="#00d4aa" stroke-width="1.5" opacity="0.4"/>
  <line x1="200" y1="280" x2="230" y2="300" stroke="#00d4aa" stroke-width="1.5" opacity="0.4"/>
  <circle cx="170" cy="300" r="3" fill="#00d4aa" opacity="0.5"/>
  <circle cx="230" cy="300" r="3" fill="#00d4aa" opacity="0.5"/>
  <line x1="170" y1="300" x2="150" y2="340" stroke="#00d4aa" stroke-width="1" opacity="0.3"/>
  <line x1="230" y1="300" x2="250" y2="340" stroke="#00d4aa" stroke-width="1" opacity="0.3"/>

  <!-- Athenaeum text -->
  <text x="200" y="460" text-anchor="middle" font-family="Georgia, serif" font-size="32" fill="#f5f0e6" font-weight="bold" letter-spacing="4">ATHENAEUM</text>
  <text x="200" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#00d4aa" letter-spacing="2" font-style="italic">Agent Consensus Protocol</text>
</svg>
